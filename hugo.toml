baseURL = "https://example.com/"
title = "Marcos Lucas"
theme = "hugo-theme-cleanwhite"
locale = "en-US"

[services]
  [services.googleAnalytics]
    id = ""

[pagination]
  pagerSize = 5

[outputs]
  home = ["HTML", "RSS"]

[params]
  header_image = "img/home-bg-jeep.jpg"
  image_404 = "img/404-bg.jpg"
  title_404 = "Page not found"

  SEOTitle = "Marcos Lucas"
  description = "Resume, personal blog, and site architecture."
  keyword = "Marcos Lucas, resume, personal blog, cloud architect, Hugo, AWS"
  slogan = "Engineer, builder, father, and CrossFitter."
  upstreamAttribution = true
  omit_categories = true

  page_view_counter = false
  algolia_search = false

  sidebar_about_description = "Senior Principal Cloud Architect, engineering leader, father, and CrossFitter."
  sidebar_avatar = "img/marcos-profile-placeholder.svg"

  featured_tags = false
  featured_condition_size = 1

  ba_track_id = ""
  disqus_proxy = ""
  disqus_site = ""
  twikoo_env_id = ""

  reward = false
  friends = false
  bookmarks = false
  about_me = false
  last_posts = false
  auto_theme = false
  dark_mode_toggle = true

  custom_css = ["css/custom.css"]
  custom_js = []

  [params.social]
    rss = true
    email = "marcos.s.lucas@gmail.com"
    linkedin = "https://www.linkedin.com/in/marcos-lucas-93692915"
    github = "https://github.com/marcos07-uy"

  [[params.additional_menus]]
    title = "Resume"
    href = "/resume"
  [[params.additional_menus]]
    title = "Personal Blog"
    href = "/blog"
  [[params.additional_menus]]
    title = "Site Architecture"
    href = "/architecture"

[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1
  [markup.highlight]
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
